{% extends "layout.html" %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Fraud Detection</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f6f9;
            margin:0;
            padding:0;
        }

        .header{
            background-color:#2c3e50;
            color:white;
            padding:15px;
            font-size:20px;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:8px;
            box-shadow:0 0 5px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        th{
            background-color:#34495e;
            color:white;
        }

        th, td{
            padding:10px;
            text-align:left;
        }

        .btn{
            padding:6px 12px;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        .btn-delete{
            background-color:red;
            color:white;
        }

        .btn-view{
            background-color:blue;
            color:white;
        }

    </style>

</head>
<body>

<div class="header">
    Admin Dashboard — Fraud Detection System
</div>

<div class="container">

    <!-- USERS SECTION -->

    <div class="card">

        <h2>All Users</h2>

        <table>

<tr>
    <th>ID</th>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
</tr>

{% for user in users %}

<tr>

    <td>{{ user.id }}</td>

    <td>
        <a href="{{ url_for('admin_user_details', user_id=user.id) }}">
            {{ user.email }}
        </a>
    </td>

    <td>{{ user.role }}</td>

    <td>

        <a href="{{ url_for('admin_user_details', user_id=user.id) }}">
            <button class="btn btn-view">
                View Details
            </button>
        </a>

        <a href="/admin/delete-user/{{user.id}}">
            <button class="btn btn-delete">
                Delete
            </button>
        </a>

    </td>

</tr>

{% endfor %}

</table>


    </div>


   
        </table>

    </div>

</div>

</body>
</html>


{% endblock %}
